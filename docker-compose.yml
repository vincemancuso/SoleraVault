services:
  postgres:
    image: postgres:16-alpine
    container_name: soleravault-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SOLERAVAULT_POSTGRES_PASSWORD:?Set SOLERAVAULT_POSTGRES_PASSWORD in .env before using Docker Compose}
      POSTGRES_DB: soleravault
    ports:
      - "5432:5432"
    volumes:
      - soleravault-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d soleravault"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  soleravault-postgres-data:
